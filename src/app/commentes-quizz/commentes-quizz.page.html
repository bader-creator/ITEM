<ion-header>
  <ion-toolbar color="secondary">
    <ion-title style="color:white;font-family: Roboto;
        font-weight: 700;
        line-height: 58px;">
      Comments
    </ion-title>
    <ion-buttons slot="secondary">
      <ion-button fill="solid" style="font-size: 18px;" (click)="onDismiss()" color="secondary">
        <ion-icon slot="start" name="close-circle"></ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="card-body msg_card_body">
    <ng-container *ngIf="CommentByQuizz">
      <div class="d-flex justify-content-end mb-4" *ngFor="let comm of CommentByQuizz">
        <div class="msg_cotainer_send">
          <ion-icon class="user_right" slot="start" name="close-circle" (click)="ConfirmSupperssion()"></ion-icon>
          <ion-label>{{comm.commentaire}}</ion-label>
          <span class="msg_time_send">{{comm?.date | date: 'dd-MM-yyyy HH:mm'}}</span>

        </div>
      </div>
    </ng-container>
    <ng-container *ngIf="GetComment">
      <div class="d-flex justify-content-end mb-4" *ngFor="let comm of GetComment">
        <div class="msg_cotainer_send">
          <ion-icon class="user_right" slot="start" name="close-circle" (click)="ConfirmSupperssion()"></ion-icon>
          <ion-label>{{comm.commentaire}}</ion-label>
          <span class="msg_time_send">{{comm?.date | date: 'dd-MM-yyyy HH:mm'}}</span>

        </div>
      </div>
    </ng-container>
  </div>


</ion-content>
<ion-footer class="footer">
  <ion-item>
    <textarea class="form-control type_msg" rows="1" placeholder="Envoyer un message" maxlength="500"
      autocapitalize="on" autosize [(ngModel)]="comment.commentaire">
    </textarea>
    <ion-buttons slot="end" (click)="sendMessage()">
      <ion-button class="input-group-text send_btn" id="submit">
        <ion-icon name="send"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-item>
</ion-footer>
