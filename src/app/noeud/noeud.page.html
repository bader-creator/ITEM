<ion-header>
  <ion-toolbar color="secondary">
    <ion-title style="color:white;font-family: Roboto;
    font-weight: 700;
    line-height: 58px;">Noeud</ion-title>
    <ion-buttons slot="secondary">
      <ion-button fill="solid" style="font-size: 18px;" (click)="GoesTOListeRegions()" color="secondary">
        <ion-icon slot="start" name="filter"></ion-icon>
      </ion-button>
      <ion-button style="font-size: 18px;" *ngIf="!isSearchbarOpened" (click)="isSearchbarOpened=true">
        <ion-icon slot="start" name="search"></ion-icon>
      </ion-button>
      <ion-button fill="solid" style="font-size: 18px;" (click)="logout()" color="secondary">
        <ion-icon slot="start" name="log-out"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-segment [(ngModel)]="segment" class="haut" style="background-color: #a0a6b9;">
    <ion-segment-button value="site" checked>
      <ion-label style="color: white;"><b>Site</b></ion-label>
    </ion-segment-button>
    <ion-segment-button value="armoire">
      <ion-label style="color: white;"><b>Armoire</b></ion-label>
    </ion-segment-button>
    <ion-segment-button value="chambre">
      <ion-label style="color: white;"><b>Chambre</b></ion-label>
    </ion-segment-button>
  </ion-segment>
  <!--_____________________________________________________________-->
  <ng-container *ngIf='segment=="site"'>
    <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
      <ion-refresher-content pullingIcon="arrow-dropdown" pullingText="Pull to refresh" refreshingSpinner="circles">
      </ion-refresher-content>
    </ion-refresher>
    <ion-searchbar *ngIf="isSearchbarOpened" showCancelButton="true" (ionInput)="getItems($event)"
      (ionCancel)="getItems($event)" (ionCancel)="isSearchbarOpened=false"></ion-searchbar>
    <ion-list>
      <ion-item *ngFor="let t of ListeSite" (click)="GoesTODetail()">
        <ion-icon name="radio" style="margin-bottom: -1px;
        margin-right: 7px;"></ion-icon>
        <ion-label style="font-size: 18px;">{{t.nom}}</ion-label>
      </ion-item>
    </ion-list>
  </ng-container>
  <!--_____________________________________________________________-->
  <ng-container *ngIf='segment=="armoire"'>
    <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
      <ion-refresher-content pullingIcon="arrow-dropdown" pullingText="Pull to refresh" refreshingSpinner="circles">
      </ion-refresher-content>
    </ion-refresher>
    <ion-searchbar *ngIf="isSearchbarOpened" showCancelButton="true" (ionInput)="getItems($event)"
      (ionCancel)="getItems($event)" (ionCancel)="isSearchbarOpened=false"></ion-searchbar>
    <ion-list>
      <ion-item *ngFor="let t of ListeAremoire" (click)="GoesTODetail()">
        <ion-icon name="radio" style="margin-bottom: -1px;
        margin-right: 7px;"></ion-icon>
        <ion-label style="font-size: 18px;">{{t.nom}}</ion-label>
      </ion-item>
    </ion-list>
  </ng-container>
  <!--_____________________________________________________________-->
  <ng-container *ngIf='segment=="chambre"'>
    <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
      <ion-refresher-content pullingIcon="arrow-dropdown" pullingText="Pull to refresh" refreshingSpinner="circles">
      </ion-refresher-content>
    </ion-refresher>
    <ion-searchbar *ngIf="isSearchbarOpened" showCancelButton="true" (ionInput)="getItems($event)"
      (ionCancel)="getItems($event)" (ionCancel)="isSearchbarOpened=false"></ion-searchbar>
    <ion-list>
      <ion-item *ngFor="let t of ListeChambre" (click)="GoesTODetail()">
        <ion-icon name="radio" style="margin-bottom: -1px;
        margin-right: 7px;"></ion-icon>
        <ion-label style="font-size: 18px;">{{t.nom}}</ion-label>
      </ion-item>
    </ion-list>
  </ng-container>
  <!--_____________________________________________________________-->
</ion-content>

<ion-footer no-padding no-marging>

  <ion-segment no-padding no-marging style="font-size: 10px;"
    style="background-color: #25368c;border-top-left-radius: 20px; " [(ngModel)]="segment">
    <ion-segment-button class="fotter" style="min-width: 60px;" value="accueil" [routerLink]="'/home'"
      routerDirection="root">
      <ion-icon name="home" style="margin-bottom: 16px;color: white;"></ion-icon>
      <ion-label>Accueil</ion-label>
    </ion-segment-button>

    <ion-segment-button class="fotter" style="min-width: 60px;" value="storage" [routerLink]="'/storage'"
      routerDirection="root">
      <ion-icon name="archive" style="margin-bottom: 16px;color: white;"></ion-icon>
      <ion-label>Storage</ion-label>
    </ion-segment-button>

    <ion-segment-button class="fotter" style="min-width: 60px;" value="audit" [routerLink]="'/audit'"
      routerDirection="root">
      <ion-icon name="newspaper" style="margin-bottom: 16px;color: white;"></ion-icon>
      <ion-label>Audit</ion-label>
    </ion-segment-button>

    <ion-segment-button class="fotter" style="min-width: 60px;" value="noeud" [routerLink]="'/noeud'"
      routerDirection="root">
      <ion-icon name="radio" style="margin-bottom: 16px;color: white;"></ion-icon>
      <ion-label>Noeud</ion-label>
    </ion-segment-button>

  </ion-segment>

</ion-footer>
