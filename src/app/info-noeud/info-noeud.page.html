<ion-header>
  <ion-toolbar color="secondary">
    <ion-title style="color:white;font-family: Roboto;
        font-weight: 700;
        line-height: 58px;
        text-align: center; margin-left: 100px;">
      BTS Infos
    </ion-title>
    <ion-buttons slot="secondary">
      <ion-button fill="solid" style="font-size: 18px;" color="secondary" (click)="onDismiss()"
        [routerLink]="'/google-maps'" routerDirection="root">
        <ion-icon slot="start" name="location"></ion-icon>
      </ion-button>
      <ion-button fill="solid" style="font-size: 18px;" (click)="onDismiss()" color="secondary">
        <ion-icon slot="start" name="close-circle"></ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>
<ion-content>
  <ion-card>
    <ion-card-header style="border-bottom: 1px groove;">
      <ion-icon name="newspaper" style="color: #25368c;
      font-size: 26px;" (click)="onDismiss()" [routerLink]="'/btsacceptance'" routerDirection="root"></ion-icon>
    </ion-card-header>

    <ion-card-content>
      <ion-item>
        <ion-label>Date Audit :</ion-label>
        <ion-label>Garoua-orange</ion-label>
      </ion-item>
      <ion-item>
        <ion-label>Auditeur :</ion-label>
        <ion-label>NRD_8080</ion-label>
      </ion-item>

    </ion-card-content>
  </ion-card>
  <ion-card>
    <ion-card-header style="border-bottom: 1px groove;">
      <ion-icon name="newspaper" style="color: #25368c;
      font-size: 26px;"></ion-icon>
    </ion-card-header>

    <ion-card-content>
      <ion-item>
        <ion-label>Date Audit :</ion-label>
        <ion-label>Tunisie-telecom</ion-label>
      </ion-item>
      <ion-item>
        <ion-label>Auditeur :</ion-label>
        <ion-label>NRD_1000</ion-label>
      </ion-item>

    </ion-card-content>
  </ion-card>
</ion-content>
