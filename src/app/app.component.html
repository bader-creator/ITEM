<ion-app>
  <ion-menu side="start" menuId="first" contentId="content1">
    <ion-header>
      <ion-toolbar color="secondary">
        <ion-title style="color:white;font-family: Roboto;
      font-weight: 700;
      line-height: 58px;
      text-align: center;">Bienvenue</ion-title>
        <ion-buttons slot="secondary">
          <ion-button fill="solid" style="font-size: 18px;" (click)="logout()" color="secondary">
            <ion-icon slot="start" name="log-out"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content>

      <!--image profil-->
      <div class="profile" style="margin: 45px;">
        <div class="content-profile">
          <img src="{{env}}{{User?.path || 'empty.png'}}"
            class="profile-img shadow-lg img-fluid z-depth-1 rounded-circle">
        </div>
      </div>

      <ion-list>
        <ion-item [routerLink]="'/home'" routerDirection="forward" (click)="toggleMenu()">
          <ion-icon name="home"></ion-icon>
          <ion-label style="font-size: 22px;margin-left: 10px;color: #131f51;font-family: serif;">Accueil
          </ion-label>
        </ion-item>
        <ion-item [routerLink]="'/storage'" routerDirection="forward" (click)="toggleMenu()">
          <ion-icon name="archive"></ion-icon>
          <ion-label style="font-size: 22px;margin-left: 10px;color: #131f51;font-family: serif;">Storage</ion-label>
        </ion-item>
        <ion-item [routerLink]="'/audit'" routerDirection="forward" (click)="toggleMenu()">
          <ion-icon name="newspaper"></ion-icon>
          <ion-label style="font-size: 22px;margin-left: 10px;color: #131f51;font-family: serif;">Audit</ion-label>
        </ion-item>
        <ion-item [routerLink]="'/noeud'" routerDirection="forward" (click)="toggleMenu()">
          <ion-icon name="radio"></ion-icon>
          <ion-label style="font-size: 22px;margin-left: 10px;color: #131f51;font-family: serif;">Site</ion-label>
        </ion-item>
        <ion-item [routerLink]="'/stock'" routerDirection="forward" (click)="toggleMenu()">
          <ion-icon name="cart"></ion-icon>
          <ion-label style="font-size: 22px;margin-left: 10px;color: #131f51;font-family: serif;">Stock</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>
  <ion-router-outlet id="content1"></ion-router-outlet>
</ion-app>
